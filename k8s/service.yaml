# A Service gives your pods a stable network address.
# Pods are ephemeral (they get created/destroyed), but a Service
# is like a permanent front door that routes traffic to healthy pods.
# Think of it as a simple load balancer / reverse proxy.
apiVersion: v1
kind: Service
metadata:
  name: todo-api-service
spec:
  type: NodePort             # Exposes the service on a port on the node (so we can reach it)
  selector:
    app: todo-api            # Route traffic to pods with this label (matches our Deployment)
  ports:
    - protocol: TCP
      port: 80               # The port the Service listens on (inside the cluster)
      targetPort: 8080       # The port on the container to forward to (our Go app)
      nodePort: 30080        # The port exposed on the node (we'll use this to access it)
